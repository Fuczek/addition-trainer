<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Column Addition Trainer</title>
<style>
  :root{
    --bg1:#6c5ce7;
    --bg2:#00cec9;
    --card:#ffffff;
    --ink:#2d3436;
    --accent:#0984e3;
    --good:#00b894;
    --bad:#e17055;
    --muted:#b2bec3;
    --col-w: clamp(42px, 11vw, 68px);
    --col-h: clamp(42px, 11vw, 60px);
    --font-size: clamp(20px, 5.2vw, 32px);
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%;
    font-family:"Trebuchet MS","Comic Sans MS",system-ui,sans-serif;
    background:linear-gradient(135deg,var(--bg1),var(--bg2));
    color:var(--ink);
  }
  body{
    display:flex; align-items:center; justify-content:center;
    min-height:100vh; padding:16px;
  }
  .app{
    width:100%; max-width:640px;
  }
  .card{
    background:var(--card);
    border-radius:24px;
    box-shadow:0 20px 50px rgba(0,0,0,0.25);
    padding:clamp(18px,4vw,32px);
    position:relative;
  }
  .top-bar{
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:12px;
  }
  h1{
    font-size:clamp(22px,5.5vw,32px);
    margin:0;
    color:var(--bg1);
  }
  .subtitle{
    color:#636e72;
    margin:4px 0 18px 0;
    font-size:clamp(14px,3.5vw,18px);
  }
  .lang-btn{
    border:none; background:var(--accent); color:white;
    padding:8px 14px; border-radius:999px; font-weight:bold;
    cursor:pointer; font-size:14px; flex-shrink:0;
  }
  .lang-btn:active{transform:scale(0.95);}

  /* ---- Start Screen ---- */
  .rounds-label{font-weight:bold; margin-bottom:10px; font-size:clamp(15px,4vw,18px);}
  .round-chips{
    display:flex; flex-wrap:wrap; gap:8px; margin-bottom:22px;
  }
  .round-chip{
    border:2px solid var(--accent);
    background:white; color:var(--accent);
    font-weight:bold; font-size:16px;
    padding:10px 0; width:48px; border-radius:12px;
    cursor:pointer;
  }
  .round-chip.selected{
    background:var(--accent); color:white;
  }
  .instructions{
    background:#f1f7ff; border-left:4px solid var(--accent);
    padding:10px 14px; border-radius:8px;
    font-size:clamp(13px,3.3vw,15px); margin-bottom:20px;
    color:#2d3436;
  }
  .primary-btn{
    display:block; width:100%; border:none; border-radius:14px;
    background:linear-gradient(135deg,var(--bg1),var(--accent));
    color:white; font-size:clamp(16px,4.2vw,20px); font-weight:bold;
    padding:14px 0; cursor:pointer;
    box-shadow:0 8px 18px rgba(9,132,227,0.35);
  }
  .primary-btn:active{transform:translateY(2px);}

  /* ---- Game Screen ---- */
  .hidden{display:none !important;}
  .progress-line{
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:6px; font-weight:bold; color:var(--accent);
    font-size:clamp(14px,3.6vw,17px);
  }
  .progress-bar-bg{
    width:100%; height:8px; background:#eee; border-radius:6px; overflow:hidden;
    margin-bottom:16px;
  }
  .progress-bar-fill{
    height:100%; background:var(--good); width:0%;
    transition:width 0.3s ease;
  }
  .digit-label{
    text-align:center; font-weight:bold; color:#636e72;
    margin-bottom:14px; font-size:clamp(14px,3.6vw,16px);
  }
  .columns-wrap{
    overflow-x:auto;
    padding-bottom:6px;
  }
  .row{
    display:flex; align-items:center; justify-content:flex-end;
  }
  .spacer{
    width:var(--col-w); min-width:var(--col-w);
    height:var(--col-h);
    display:flex; align-items:center; justify-content:center;
    font-size:var(--font-size); font-weight:bold; color:var(--ink);
  }
  .cell{
    width:var(--col-w); min-width:var(--col-w);
    height:var(--col-h);
    display:flex; align-items:center; justify-content:center;
    font-size:var(--font-size); font-weight:bold;
    color:var(--ink);
  }
  .carry-row .cell{
    height:calc(var(--col-h) * 0.55);
    font-size:calc(var(--font-size) * 0.55);
  }
  .carry-cell{
    border:2px dashed var(--bad);
    border-radius:8px;
    color:var(--bad);
    background:#fff5f2;
    text-align:center;
    font-weight:bold;
  }
  .carry-cell.invisible{
    visibility:hidden;
    border:none;
    background:none;
  }
  .line-row{
    height:0; position:relative; margin:4px 0 8px 0;
  }
  .full-line{
    flex:1; border-top:4px solid var(--ink); border-radius:2px;
  }
  .answer-cell{
    border:2px solid var(--muted);
    border-radius:10px;
    text-align:center;
    background:#fbfbfd;
  }
  .answer-cell:disabled{
    background:#f4f4f6;
    color:#a0a0a5;
  }
  .answer-cell.active{
    border-color:var(--accent);
    box-shadow:0 0 0 4px rgba(9,132,227,0.15);
    background:white;
  }
  .carry-cell.active{
    border-color:var(--bad);
    box-shadow:0 0 0 4px rgba(225,112,85,0.18);
  }
  .cell.correct{
    border-color:var(--good) !important;
    color:var(--good) !important;
    background:#eafff5 !important;
  }
  .cell.incorrect{
    animation:shake 0.35s;
    border-color:var(--bad) !important;
    background:#ffecec !important;
  }
  @keyframes shake{
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-6px);}
    40%{transform:translateX(6px);}
    60%{transform:translateX(-4px);}
    80%{transform:translateX(4px);}
  }
  input.cell{ font-family:inherit; padding:0; }
  input.cell:focus{ outline:none; }

  .hint{
    text-align:center; min-height:26px;
    color:var(--bad); font-weight:bold;
    font-size:clamp(13px,3.4vw,15px);
    margin-top:14px;
  }

  /* ---- Round complete / End screen overlay ---- */
  .overlay{
    text-align:center; padding:20px 0;
  }
  .overlay h2{
    font-size:clamp(24px,6vw,32px);
    color:var(--good); margin-bottom:8px;
  }
  .overlay p{
    color:#636e72; margin-bottom:22px; font-size:clamp(14px,3.8vw,17px);
  }
</style>
</head>
<body>
<div class="app">
  <div class="card">

    <!-- START SCREEN -->
    <div id="startScreen">
      <div class="top-bar">
        <h1 data-i18n="title">Column Addition Trainer</h1>
        <button class="lang-btn" id="langBtnStart"></button>
      </div>
      <p class="subtitle" data-i18n="subtitle">Learn written addition step by step!</p>

      <div class="rounds-label" data-i18n="chooseRoundsLabel">How many rounds?</div>
      <div class="round-chips" id="roundChips"></div>

      <div class="instructions" data-i18n="instructions">
        Fill in one box at a time, starting from the ones column on the right.
      </div>

      <button class="primary-btn" id="startBtn" data-i18n="startBtn">Start</button>
    </div>

    <!-- GAME SCREEN -->
    <div id="gameScreen" class="hidden">
      <div class="top-bar">
        <h1 data-i18n="title" style="font-size:clamp(18px,4.5vw,24px);">Column Addition Trainer</h1>
        <button class="lang-btn" id="langBtnGame"></button>
      </div>
      <div class="progress-line">
        <span id="progressLabel"></span>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
      <div class="digit-label" id="digitLabel"></div>

      <div class="columns-wrap">
        <div class="row carry-row" id="carryRow"></div>
        <div class="row num-row" id="num1Row"></div>
        <div class="row num-row" id="num2Row"></div>
        <div class="row line-row"><div class="spacer"></div><div class="full-line"></div></div>
        <div class="row answer-row" id="answerRow"></div>
      </div>

      <div class="hint" id="hintLine"></div>
    </div>

    <!-- ROUND COMPLETE SCREEN -->
    <div id="roundCompleteScreen" class="hidden overlay">
      <h2 data-i18n="roundCompleteTitle">🎉 Round complete!</h2>
      <p id="roundCompleteSub"></p>
      <button class="primary-btn" id="nextRoundBtn"></button>
    </div>

    <!-- END SCREEN -->
    <div id="endScreen" class="hidden overlay">
      <h2 data-i18n="finalTitle">🏆 Well done!</h2>
      <p id="finalRoundsLine"></p>
      <p id="finalMistakesLine"></p>
      <button class="primary-btn" id="playAgainBtn" data-i18n="playAgainBtn">Play again</button>
    </div>

  </div>
</div>

<script>
/* ---------------- i18n ---------------- */
const STRINGS = {
  en: {
    title: "Column Addition Trainer",
    subtitle: "Learn written addition step by step!",
    chooseRoundsLabel: "How many rounds?",
    startBtn: "Start",
    instructions: "Fill in one box at a time, starting from the ones column on the right. If a column adds up to 10 or more, write the small carry number above the next column before continuing.",
    roundProgress: "Round {current} of {total}",
    digitsLabel: "{n}-digit numbers",
    hintCarryActive: "Write the carry above the next column ⬆",
    hintAnswerActive: "Write the result digit for this column",
    roundCompleteTitle: "🎉 Round complete!",
    roundCompleteSub: "No mistakes this round \u2014 great job!",
    roundCompleteSubMistakes: "You made {mistakes} mistake(s) this round.",
    nextRoundBtn: "Next round",
    finishBtn: "See results",
    finalTitle: "🏆 Well done!",
    finalRoundsLine: "You completed {completed} of {total} rounds.",
    finalMistakesLine: "Total mistakes: {mistakes}",
    playAgainBtn: "Play again",
    langBtn: "PL"
  },
  pl: {
    title: "Trener dodawania pisemnego",
    subtitle: "Naucz się dodawania pisemnego krok po kroku!",
    chooseRoundsLabel: "Ile rund?",
    startBtn: "Start",
    instructions: "Uzupełniaj po jednym polu, zaczynając od kolumny jedności po prawej stronie. Jeśli suma w kolumnie wynosi 10 lub więcej, zapisz małe przeniesienie nad następną kolumną, zanim przejdziesz dalej.",
    roundProgress: "Runda {current} z {total}",
    digitsLabel: "Liczby {n}-cyfrowe",
    hintCarryActive: "Zapisz przeniesienie nad następną kolumną ⬆",
    hintAnswerActive: "Zapisz cyfrę wyniku dla tej kolumny",
    roundCompleteTitle: "🎉 Runda ukończona!",
    roundCompleteSub: "Brak błędów w tej rundzie \u2014 świetna robota!",
    roundCompleteSubMistakes: "Popełniono {mistakes} błąd(ów) w tej rundzie.",
    nextRoundBtn: "Następna runda",
    finishBtn: "Zobacz wynik",
    finalTitle: "🏆 Świetna robota!",
    finalRoundsLine: "Ukończono {completed} z {total} rund.",
    finalMistakesLine: "Liczba błędów: {mistakes}",
    playAgainBtn: "Zagraj ponownie",
    langBtn: "EN"
  }
};
let lang = 'en';
function t(key, vars){
  let str = (STRINGS[lang] && STRINGS[lang][key]) || key;
  if(vars){
    Object.keys(vars).forEach(k=>{ str = str.replace('{'+k+'}', vars[k]); });
  }
  return str;
}
function applyStaticI18n(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    el.textContent = t(el.dataset.i18n);
  });
  document.getElementById('langBtnStart').textContent = t('langBtn');
  document.getElementById('langBtnGame').textContent = t('langBtn');
  refreshDynamicTexts();
}
function toggleLang(){
  lang = (lang === 'en') ? 'pl' : 'en';
  applyStaticI18n();
}

/* ---------------- State ---------------- */
let totalRounds = 7;
let roundPlan = [];
let currentRoundIndex = 0;
let currentProblem = null;
let steps = [];
let currentStepIndex = 0;
let mistakesThisRound = 0;
let totalMistakes = 0;
let roundsCompleted = 0;
let currentNumColumns = 0;

/* ---------------- Helpers: math ---------------- */
function randInt(min, max){
  return Math.floor(Math.random() * (max - min + 1)) + min;
}
function randDigits(digitCount){
  const arr = [];
  for(let p = 0; p < digitCount; p++){
    arr[p] = (p === digitCount - 1) ? randInt(1, 9) : randInt(0, 9);
  }
  return arr;
}
function simulateHasCarry(d1, d2, digitCount){
  let carry = 0;
  for(let p = 0; p < digitCount; p++){
    const sum = d1[p] + d2[p] + carry;
    if(sum >= 10) return true;
    carry = 0;
  }
  return false;
}
function generateNumbers(digitCount, requireCarry){
  for(let attempt = 0; attempt < 300; attempt++){
    const d1 = randDigits(digitCount);
    const d2 = randDigits(digitCount);
    if(simulateHasCarry(d1, d2, digitCount) === requireCarry){
      return { d1, d2 };
    }
  }
  return { d1: randDigits(digitCount), d2: randDigits(digitCount) };
}
function buildSteps(d1, d2, digitCount){
  const result = [];
  let carry = 0;
  let place = 0;
  const maxPlace = digitCount - 1;
  while(place <= maxPlace || carry > 0){
    const a = place <= maxPlace ? d1[place] : 0;
    const b = place <= maxPlace ? d2[place] : 0;
    const sum = a + b + carry;
    const resultDigit = sum % 10;
    const newCarry = Math.floor(sum / 10);
    result.push({ type: 'answer', place, value: resultDigit });
    if(newCarry > 0){
      result.push({ type: 'carry', place: place + 1, value: newCarry });
    }
    carry = newCarry;
    place++;
  }
  return result;
}
function buildRoundPlan(n){
  const plan = [];
  for(let i = 0; i < n; i++){
    const fraction = n > 1 ? i / (n - 1) : 0;
    const digitCount = 2 + Math.round(fraction * 2); // 2..4
    const requireCarry = Math.random() < 0.5;
    plan.push({ digitCount, requireCarry });
  }
  return plan;
}

/* ---------------- Start Screen ---------------- */
const roundChipsEl = document.getElementById('roundChips');
function renderRoundChips(){
  roundChipsEl.innerHTML = '';
  for(let n = 5; n <= 10; n++){
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'round-chip' + (n === totalRounds ? ' selected' : '');
    btn.textContent = n;
    btn.addEventListener('click', () => {
      totalRounds = n;
      renderRoundChips();
    });
    roundChipsEl.appendChild(btn);
  }
}
renderRoundChips();

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('langBtnStart').addEventListener('click', toggleLang);
document.getElementById('langBtnGame').addEventListener('click', toggleLang);
document.getElementById('playAgainBtn').addEventListener('click', () => {
  show('startScreen');
});

function startGame(){
  roundPlan = buildRoundPlan(totalRounds);
  currentRoundIndex = 0;
  totalMistakes = 0;
  roundsCompleted = 0;
  show('gameScreen');
  startRound();
}

/* ---------------- Screen switching ---------------- */
function show(id){
  ['startScreen','gameScreen','roundCompleteScreen','endScreen'].forEach(s=>{
    document.getElementById(s).classList.toggle('hidden', s !== id);
  });
}

/* ---------------- Game Round ---------------- */
function startRound(){
  const plan = roundPlan[currentRoundIndex];
  currentProblem = generateNumbers(plan.digitCount, plan.requireCarry);
  currentProblem.digitCount = plan.digitCount;
  steps = buildSteps(currentProblem.d1, currentProblem.d2, plan.digitCount);
  currentStepIndex = 0;
  mistakesThisRound = 0;
  renderProblem();
  updateProgress();
  activateStep(0);
}

function updateProgress(){
  document.getElementById('progressLabel').textContent =
    t('roundProgress', { current: currentRoundIndex + 1, total: totalRounds });
  document.getElementById('progressFill').style.width =
    Math.round((currentRoundIndex / totalRounds) * 100) + '%';
  document.getElementById('digitLabel').textContent =
    t('digitsLabel', { n: currentProblem.digitCount });
}
function refreshDynamicTexts(){
  if(currentProblem){
    updateProgress();
    updateHint();
  }
}

function makeCell(text, cls){
  const div = document.createElement('div');
  div.className = cls;
  div.textContent = text;
  return div;
}
function makeSpacer(text){
  const div = document.createElement('div');
  div.className = 'spacer';
  div.textContent = text || '';
  return div;
}

function renderProblem(){
  const { d1, d2, digitCount } = currentProblem;
  const numColumns = Math.max(...steps.map(s => s.place)) + 1;
  currentNumColumns = numColumns;

  const carryRow = document.getElementById('carryRow');
  const num1Row = document.getElementById('num1Row');
  const num2Row = document.getElementById('num2Row');
  const answerRow = document.getElementById('answerRow');
  carryRow.innerHTML = '';
  num1Row.innerHTML = '';
  num2Row.innerHTML = '';
  answerRow.innerHTML = '';

  carryRow.appendChild(makeSpacer(''));
  num1Row.appendChild(makeSpacer(''));
  num2Row.appendChild(makeSpacer('+'));
  answerRow.appendChild(makeSpacer(''));

  const carryPlaces = new Set(steps.filter(s => s.type === 'carry').map(s => s.place));

  for(let place = numColumns - 1; place >= 0; place--){
    // carry row
    if(carryPlaces.has(place)){
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.setAttribute('inputmode', 'numeric');
      inp.setAttribute('pattern', '[0-9]*');
      inp.maxLength = 1;
      inp.className = 'cell carry-cell';
      inp.dataset.type = 'carry';
      inp.dataset.place = place;
      inp.disabled = true;
      inp.addEventListener('input', onCellInput);
      carryRow.appendChild(inp);
    } else {
      carryRow.appendChild(makeCell('', 'cell carry-cell invisible'));
    }
    // num1 / num2
    const v1 = place < digitCount ? String(d1[place]) : '';
    const v2 = place < digitCount ? String(d2[place]) : '';
    num1Row.appendChild(makeCell(v1, 'cell num-cell'));
    num2Row.appendChild(makeCell(v2, 'cell num-cell'));
    // answer row
    const ainp = document.createElement('input');
    ainp.type = 'text';
    ainp.setAttribute('inputmode', 'numeric');
    ainp.setAttribute('pattern', '[0-9]*');
    ainp.maxLength = 1;
    ainp.className = 'cell answer-cell';
    ainp.dataset.type = 'answer';
    ainp.dataset.place = place;
    ainp.disabled = true;
    ainp.addEventListener('input', onCellInput);
    answerRow.appendChild(ainp);
  }
}

function findStepEl(step){
  return document.querySelector(`.cell[data-type="${step.type}"][data-place="${step.place}"]`);
}

function activateStep(idx){
  document.querySelectorAll('.cell.active').forEach(el => el.classList.remove('active'));
  const step = steps[idx];
  const el = findStepEl(step);
  if(el){
    el.disabled = false;
    el.classList.add('active');
    el.value = '';
    setTimeout(() => el.focus(), 50);
  }
  updateHint();
}

function updateHint(){
  const hintEl = document.getElementById('hintLine');
  if(!steps.length || currentStepIndex >= steps.length){
    hintEl.textContent = '';
    return;
  }
  const step = steps[currentStepIndex];
  hintEl.textContent = step.type === 'carry' ? t('hintCarryActive') : t('hintAnswerActive');
}

function onCellInput(e){
  const el = e.target;
  const val = el.value.replace(/[^0-9]/g, '');
  el.value = val;
  if(val.length !== 1) return;

  const step = steps[currentStepIndex];
  const digit = parseInt(val, 10);

  if(digit === step.value){
    el.classList.remove('incorrect');
    el.classList.add('correct');
    el.classList.remove('active');
    el.disabled = true;
    currentStepIndex++;
    if(currentStepIndex < steps.length){
      activateStep(currentStepIndex);
    } else {
      finishRound();
    }
  } else {
    el.classList.add('incorrect');
    mistakesThisRound++;
    totalMistakes++;
    setTimeout(() => {
      el.value = '';
      el.classList.remove('incorrect');
      el.focus();
    }, 450);
  }
}

function finishRound(){
  roundsCompleted++;
  const sub = document.getElementById('roundCompleteSub');
  sub.textContent = mistakesThisRound === 0
    ? t('roundCompleteSub')
    : t('roundCompleteSubMistakes', { mistakes: mistakesThisRound });

  const isLast = currentRoundIndex >= totalRounds - 1;
  const nextBtn = document.getElementById('nextRoundBtn');
  nextBtn.textContent = isLast ? t('finishBtn') : t('nextRoundBtn');
  nextBtn.onclick = () => {
    currentRoundIndex++;
    if(currentRoundIndex < totalRounds){
      show('gameScreen');
      startRound();
    } else {
      endGame();
    }
  };
  show('roundCompleteScreen');
}

function endGame(){
  document.getElementById('finalRoundsLine').textContent =
    t('finalRoundsLine', { completed: roundsCompleted, total: totalRounds });
  document.getElementById('finalMistakesLine').textContent =
    t('finalMistakesLine', { mistakes: totalMistakes });
  show('endScreen');
}

/* ---------------- Init ---------------- */
applyStaticI18n();
</script>
</body>
</html>
