                mulInstrCarry: 'Świetnie! Jaka jest cyfra przeniesienia do następnej kolumny? Wpisz ją nad następną kolumną. (Wpisz 0, jeśli nie ma przeniesienia!)',
                divInstrQuotient: (value, divisor) => `Liczba do podzielenia to teraz <strong>${value}</strong>. Ile pełnych razy ${divisor} mieści się w ${value}? Wpisz cyfrę powyżej.`,
                divInstrSubtrahend: (divisor, q, value) => `Teraz pomnóż: <strong>${divisor} × ${q}</strong>. Wpisz wynik poniżej linii, pod <strong>${value}</strong>.`,
                divInstrDifference: (value, product) => `Teraz odejmij: <strong>${value} − ${product}</strong>. Wpisz wynik poniżej.`,
                problemSolvedAdd: (n1, n2, ans) => `Wspaniale! ${n1} + ${n2} = ${ans}. Zadanie rozwiązane!`,
                problemSolvedSub: (n1, n2, ans) => `Wspaniale! ${n1} − ${n2} = ${ans}. Zadanie rozwiązane!`,
                problemSolvedMul: (n1, n2, ans) => `Wspaniale! ${n1} × ${n2} = ${ans}. Zadanie rozwiązane!`,
                problemSolvedDiv: (n1, n2, q, r) => r > 0
                    ? `Wspaniale! ${n1} ÷ ${n2} = ${q} reszty ${r}. Zadanie rozwiązane!`
                    : `Wspaniale! ${n1} ÷ ${n2} = ${q}. Zadanie rozwiązane!`,
                modePractice: 'Trening',
                modeExam: 'Egzamin',
                chooseEquations: 'Liczba zadań:',
                startExam: 'Rozpocznij egzamin',
                examTitle: 'Egzamin',
                checkAnswersBtn: 'Sprawdź odpowiedzi',
                correctAnswerIs: (ans) => `Poprawna odpowiedź: ${ans}`,
                correctAnswerIsDiv: (q, r) => r > 0 ? `Poprawna odpowiedź: ${q} reszty ${r}` : `Poprawna odpowiedź: ${q}`,
                examScoreText: (correct, total, pct, points) => `Rozwiązano ${correct} z ${total} (${pct}%) — ${points} punktów`,
                examPass: 'Zdałeś! 🎉',
                examFail: 'Niestety, nie udało się — ćwicz dalej!',
            }
        };

        const OPS = ['addition', 'subtraction', 'multiplication', 'division'];
        const STATS_KEY = 'columnMathStats';
        const LANG_KEY = 'columnMathLang';

        let lang = localStorage.getItem(LANG_KEY) || 'en';
        let stats = loadStats();
        let selectedTypes = [...OPS];

        let totalRounds = 5;
        let currentRound = 1;
        let score = 0;
        let problem = null;

        let activeMode = 'practice';
        let examProblems = [];

        function loadStats() {
            const base = { addition: 0, subtraction: 0, multiplication: 0, division: 0 };
            try {
                const raw = JSON.parse(localStorage.getItem(STATS_KEY));
                if (raw) return Object.assign(base, raw);
            } catch (e) { /* ignore corrupt cache */ }
            return base;
        }

        function saveStats() {
            localStorage.setItem(STATS_KEY, JSON.stringify(stats));
        }

        function t(key, ...args) {
            const entry = translations[lang][key];
            return typeof entry === 'function' ? entry(...args) : entry;
        }

        function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

        function toggleLang() {
            lang = lang === 'en' ? 'pl' : 'en';
            localStorage.setItem(LANG_KEY, lang);
            refreshVisibleScreenText();
        }

        function refreshVisibleScreenText() {
            document.documentElement.lang = lang;
            if (!document.getElementById('setup-screen').classList.contains('hidden')) {
                renderMenu();
            } else if (!document.getElementById('game-screen').classList.contains('hidden')) {
                document.getElementById('lang-toggle-game').textContent = lang === 'en' ? 'PL' : 'EN';
                document.getElementById('menu-btn-game').textContent = t('menu');
                document.getElementById('next-btn').textContent = t('nextRound');
                updateRoundScoreText();
                updateInstruction();
            } else if (!document.getElementById('exam-screen').classList.contains('hidden')) {
                refreshExamScreenText();
            } else {
                renderEndScreen();
            }
        }

        function renderMenu() {
            document.title = t('appTitle');
            document.documentElement.lang = lang;
            document.getElementById('menu-title').textContent = t('appTitle');
            document.getElementById('menu-tagline').textContent = t('menuTagline');
            document.getElementById('choose-ops-label').textContent = t('chooseOperations');
            document.getElementById('rounds-label').innerHTML = `<strong>${t('chooseRounds')}</strong>`;
            document.getElementById('start-btn').textContent = t('startGame');
            document.getElementById('lang-toggle').textContent = lang === 'en' ? 'PL' : 'EN';
            document.getElementById('select-warning').textContent = t('selectAtLeastOne');
            document.getElementById('tab-practice').textContent = t('modePractice');
            document.getElementById('tab-exam').textContent = t('modeExam');
            document.getElementById('equations-label').innerHTML = `<strong>${t('chooseEquations')}</strong>`;
            document.getElementById('start-exam-btn').textContent = t('startExam');
            switchMode(activeMode);

            const list = document.getElementById('op-list');
            list.innerHTML = '';
            OPS.forEach(op => {
                const label = document.createElement('label');
                label.className = 'op-item';

                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.value = op;
                cb.checked = selectedTypes.includes(op);
                cb.addEventListener('change', onOpToggle);

                const nameSpan = document.createElement('span');
                nameSpan.className = 'op-name';
                nameSpan.textContent = t('operation' + capitalize(op));

                const statSpan = document.createElement('span');
                statSpan.className = 'op-stat';
                statSpan.textContent = `${t('correctAnswersLabel')} ${stats[op] || 0}`;

                label.appendChild(cb);
                label.appendChild(nameSpan);
                label.appendChild(statSpan);
                list.appendChild(label);
            });
        }

        function onOpToggle(e) {
            const op = e.target.value;
            if (e.target.checked) {
                if (!selectedTypes.includes(op)) selectedTypes.push(op);
            } else {
                selectedTypes = selectedTypes.filter(o => o !== op);
            }
            document.getElementById('select-warning').classList.add('hidden');
        }

        function switchMode(mode) {
            activeMode = mode;
            document.getElementById('tab-practice').classList.toggle('active', mode === 'practice');
            document.getElementById('tab-exam').classList.toggle('active', mode === 'exam');
            document.getElementById('practice-options').classList.toggle('hidden', mode !== 'practice');
            document.getElementById('exam-options').classList.toggle('hidden', mode !== 'exam');
        }

        function startGame() {
            if (selectedTypes.length === 0) {
                document.getElementById('select-warning').classList.remove('hidden');
                return;
            }
            totalRounds = parseInt(document.getElementById('round-select').value, 10);
            currentRound = 1;
            score = 0;
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('menu-btn-game').textContent = t('menu');
            generateRound();
        }

        function backToMenu() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('exam-screen').classList.add('hidden');
            document.getElementById('setup-screen').classList.remove('hidden');
            renderMenu();
        }

        /* ---------- Round generation ---------- */

        function digitTier(round, total) {
            if (round > total * 0.7) return { min: 3, max: 4 };
            if (round > total * 0.35) return { min: 2, max: 3 };
            return { min: 2, max: 2 };
        }

        function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

        function genNumber(tier) {
            const rangeMin = Math.pow(10, tier.min - 1);
            const rangeMax = Math.pow(10, tier.max) - 1;
            return randInt(rangeMin, rangeMax);
        }

        function digitsReversed(n) { return n.toString().split('').reverse(); }

        function getDigitAtColumn(n, col) {
            const s = digitsReversed(n);
            return col < s.length ? parseInt(s[col], 10) : 0;
        }

        function numLen(n) { return n.toString().length; }

        function requiresCarryAdd(n1, n2) {
            const s1 = digitsReversed(n1), s2 = digitsReversed(n2);
            for (let i = 0; i < Math.min(s1.length, s2.length); i++) {
                if (parseInt(s1[i], 10) + parseInt(s2[i], 10) >= 10) return true;
            }
            return false;
        }

        function generateProblem(type, round, total) {
            const tier = digitTier(round, total);
            if (type === 'addition') return genAddition(tier);
            if (type === 'subtraction') return genSubtraction(tier);
            if (type === 'multiplication') return genMultiplication(tier);
            return genDivision(tier);
        }

        function genAddition(tier) {
            let num1 = genNumber(tier);
            let num2 = genNumber(tier);
            if (!requiresCarryAdd(num1, num2)) { num1 += 5; }
            return { type: 'addition', num1, num2, maxDigits: 5, colIndex: 0, stepState: 'ANSWER' };
        }

        function genSubtraction(tier) {
            let num1 = genNumber(tier);
            let num2 = genNumber(tier);
            if (num1 < num2) { const tmp = num1; num1 = num2; num2 = tmp; }
            const colCount = numLen(num1);
            const originalTop = [];
            const bottomDigits = [];
            for (let col = 0; col < colCount; col++) {
                originalTop.push(getDigitAtColumn(num1, col));
                bottomDigits.push(getDigitAtColumn(num2, col));
            }
            const p = {
                type: 'subtraction', num1, num2, colCount,
                originalTop, topDigits: [...originalTop], bottomDigits,
                colIndex: 0, stepState: 'ANSWER',
                borrowChain: [], chainPos: 0, pendingAnswerCol: null, currentBorrowed: false
            };
            setupSubtractionColumn(p, 0);
            return p;
        }

        function setupSubtractionColumn(p, col) {
            if (p.topDigits[col] < p.bottomDigits[col]) {
                let j = col + 1;
                while ((p.topDigits[j] - 1) < p.bottomDigits[j]) j++;
                p.borrowChain = [];
                for (let k = j; k >= col + 1; k--) p.borrowChain.push(k);
                p.chainPos = 0;
                p.pendingAnswerCol = col;
                p.currentBorrowed = true;
                p.colIndex = col;
                p.stepState = 'REDUCE';
            } else {
                p.currentBorrowed = false;
                p.colIndex = col;
                p.stepState = 'ANSWER';
            }
        }

        function genMultiplication(tier) {
            const num1 = genNumber(tier);
            const multiplier = randInt(2, 9);
            return { type: 'multiplication', num1, multiplier, maxDigits: 5, colIndex: 0, stepState: 'ANSWER' };
        }

        function genDivision(tier) {
            const dividend = genNumber(tier);
            const divisor = randInt(2, 9);
            const digits = dividend.toString().split('').map(Number);
            const n = digits.length;
            let value = 0;
            let startPos = n - 1;
            for (let k = 0; k < n; k++) {
                value = value * 10 + digits[k];
                if (value >= divisor) { startPos = k; break; }
            }
            const runningRemainder = Math.floor(value / 10);
            return {
                type: 'division', dividend, divisor, digits, n, startPos,
                pos: startPos, stepState: 'QUOTIENT', quotientDigits: {}, runningRemainder,
                rows: [], activeRow: null
            };
        }

        /* ---------- Shared columnar engine (addition / multiplication) ---------- */

        function getD1(p, col) { return getDigitAtColumn(p.num1, col); }
        function getD2(p, col) { return p.type === 'multiplication' ? p.multiplier : getDigitAtColumn(p.num2, col); }

        function getCarryIn(p, col) {
            if (col === 0) return 0;
            const el = document.getElementById(`carry-${col}`);
            return (el && el.value) ? parseInt(el.value, 10) : 0;
        }

        function maxLen(p) {
            if (p.type === 'multiplication') return numLen(p.num1);
            return Math.max(numLen(p.num1), numLen(p.num2));
        }

        function computeColumn(p, col) {
            const d1 = getD1(p, col), d2 = getD2(p, col), cin = getCarryIn(p, col);
            const raw = p.type === 'multiplication' ? d1 * d2 + cin : d1 + d2 + cin;
            return { digit: raw % 10, out: Math.floor(raw / 10), d1, d2, cin, raw };
        }

        function buildColumnarGrid(grid) {
            const p = problem;
            const maxDigits = p.maxDigits;
            const secondDisplay = p.type === 'multiplication' ? p.multiplier : p.num2;
            const opSymbol = p.type === 'addition' ? '+' : '×';
            grid.style.gridTemplateColumns = `repeat(${maxDigits}, 50px)`;
            const s1 = p.num1.toString().padStart(maxDigits, ' ');
            const s2 = secondDisplay.toString().padStart(maxDigits, ' ');

            for (let i = 0; i < maxDigits; i++) {
                const col = maxDigits - 1 - i;
                const div = document.createElement('div');
                div.className = `grid-item carry-row col-${col}`;
                if (col > 0) {
                    const input = document.createElement('input');
                    input.type = 'text'; input.maxLength = 1; input.className = 'carry-input';
                    input.id = `carry-${col}`; input.disabled = true;
                    input.addEventListener('input', e => handleColumnarInput(e, 'CARRY'));
                    div.appendChild(input);
                }
                grid.appendChild(div);
            }

            for (let i = 0; i < maxDigits; i++) {
                const col = maxDigits - 1 - i;
                const div = document.createElement('div');
                div.className = `grid-item col-${col}`;
                div.innerText = s1[i] === ' ' ? '' : s1[i];
                grid.appendChild(div);
            }

            for (let i = 0; i < maxDigits; i++) {
                const col = maxDigits - 1 - i;
                const div = document.createElement('div');
                div.className = `grid-item col-${col}`;
                if (i === 0) {
                    const op = document.createElement('span');
                    op.className = 'operator'; op.innerText = opSymbol;
                    div.appendChild(op);
                } else {
                    div.innerText = s2[i] === ' ' ? '' : s2[i];
                }
                grid.appendChild(div);
            }

            const line = document.createElement('div');
            line.className = 'line-row';
            grid.appendChild(line);

            for (let i = 0; i < maxDigits; i++) {
                const col = maxDigits - 1 - i;
                const div = document.createElement('div');
                div.className = `grid-item col-${col}`;
                const input = document.createElement('input');
                input.type = 'text'; input.maxLength = 1; input.className = 'answer-input';
                input.id = `answer-${col}`; input.disabled = true;
                input.addEventListener('input', e => handleColumnarInput(e, 'ANSWER'));
                div.appendChild(input);
                grid.appendChild(div);
            }
        }

        function updateColumnarHighlights() {
            const p = problem;
            document.querySelectorAll('.grid-item').forEach(el => el.classList.remove('active-column'));
            document.querySelectorAll(`.col-${p.colIndex}`).forEach(el => el.classList.add('active-column'));
            document.querySelectorAll('.answer-input, .carry-input').forEach(el => el.disabled = true);

            if (p.stepState === 'ANSWER') {
                const el = document.getElementById(`answer-${p.colIndex}`);
                if (el) { el.disabled = false; el.focus(); }
            } else {
                const el = document.getElementById(`carry-${p.colIndex + 1}`);
                if (el) { el.disabled = false; el.focus(); }
            }
        }

        function updateColumnarInstruction() {
            const box = document.getElementById('instruction-box');
            const p = problem;
            if (p.stepState === 'ANSWER') {
                const r = computeColumn(p, p.colIndex);
                if (p.type === 'addition') box.innerHTML = t('addInstrAnswer', r.d1, r.d2, r.cin, r.raw);
                else box.innerHTML = t('mulInstrAnswer', r.d1, r.d2, r.cin, r.raw);
            } else {
                box.innerHTML = p.type === 'addition' ? t('addInstrCarry') : t('mulInstrCarry');
            }
        }

        function handleColumnarInput(event, stepType) {
            const val = event.target.value;
            if (!/^\d$/.test(val)) { event.target.value = ''; return; }
            const digitInput = parseInt(val, 10);
            const p = problem;
            const feedback = document.getElementById('feedback-message');
            const result = computeColumn(p, p.colIndex);

            if (stepType === 'ANSWER') {
                if (digitInput === result.digit) {
                    registerCorrect(p.type);
                    feedback.className = 'feedback correct';
                    feedback.innerText = t('correctDigit');
                    if (result.out !== 0) {
                        p.stepState = 'CARRY';
                        updateColumnarHighlights(); updateColumnarInstruction();
                    } else {
                        advanceColumnar(result);
                    }
                } else {
                    feedback.className = 'feedback incorrect';
                    feedback.innerText = t('incorrectDigitTry');
                    event.target.value = '';
                }
            } else {
                if (digitInput === result.out) {
                    registerCorrect(p.type);
                    feedback.className = 'feedback correct';
                    feedback.innerText = t('correctCarry');
                    advanceColumnar(result);
                } else {
                    feedback.className = 'feedback incorrect';
                    feedback.innerText = t('incorrectCarry');
                    event.target.value = '';
                }
            }
        }

        function advanceColumnar(result) {
            const p = problem;
            const ml = maxLen(p);
            if (p.colIndex >= ml - 1 && result.out === 0) {
                finishColumnar();
            } else {
                p.colIndex++;
                p.stepState = 'ANSWER';
                updateColumnarHighlights(); updateColumnarInstruction();
            }
        }

        function finishColumnar() {
            const p = problem;
            document.querySelectorAll('.answer-input, .carry-input').forEach(el => el.disabled = true);
            document.getElementById('next-btn').classList.remove('hidden');
            document.getElementById('instruction-box').innerHTML = t('clickNext');
            const feedback = document.getElementById('feedback-message');
            feedback.className = 'feedback correct';
            if (p.type === 'addition') feedback.innerText = t('problemSolvedAdd', p.num1, p.num2, p.num1 + p.num2);
            else feedback.innerText = t('problemSolvedMul', p.num1, p.multiplier, p.num1 * p.multiplier);
        }

        /* ---------- Subtraction engine (Polish method: borrow reduces the digit to the left) ---------- */

        function buildSubtractionGrid(grid) {
            const p = problem;
            const n = p.colCount;
            const totalCols = n + 1;
            grid.style.gridTemplateColumns = `repeat(${totalCols}, 50px)`;
            const s2 = p.num2.toString().padStart(n, ' ');

            const annoGutter = document.createElement('div');
            annoGutter.className = 'grid-item anno-row';
            grid.appendChild(annoGutter);
            for (let col = n - 1; col >= 0; col--) {
                const div = document.createElement('div');
                div.className = `grid-item anno-row col-${col}`;
                const input = document.createElement('input');
                input.type = 'text'; input.maxLength = 2; input.className = 'anno-input';
                input.id = `anno-${col}`; input.disabled = true;
                input.addEventListener('input', e => handleAnnoInput(e, col));
                div.appendChild(input);
                grid.appendChild(div);
            }

            const topGutter = document.createElement('div');
            topGutter.className = 'grid-item';
            grid.appendChild(topGutter);
            for (let col = n - 1; col >= 0; col--) {
                const div = document.createElement('div');
                div.className = `grid-item col-${col}`;
                const digitSpan = document.createElement('span');
                digitSpan.className = 'top-digit';
                digitSpan.id = `top-${col}`;
                digitSpan.innerText = p.topDigits[col];
                div.appendChild(digitSpan);
                grid.appendChild(div);
            }

            const opGutter = document.createElement('div');
            opGutter.className = 'grid-item';
            const op = document.createElement('span');
            op.className = 'operator'; op.innerText = '−';
            opGutter.appendChild(op);
            grid.appendChild(opGutter);
            for (let col = n - 1; col >= 0; col--) {
                const div = document.createElement('div');
                div.className = `grid-item col-${col}`;
                div.innerText = s2[n - 1 - col] === ' ' ? '' : s2[n - 1 - col];
                grid.appendChild(div);
            }

            const line = document.createElement('div');
            line.className = 'line-row';
            grid.appendChild(line);

            const answerGutter = document.createElement('div');
            answerGutter.className = 'grid-item';
            grid.appendChild(answerGutter);
            for (let col = n - 1; col >= 0; col--) {
                const div = document.createElement('div');
                div.className = `grid-item col-${col}`;
                const input = document.createElement('input');
                input.type = 'text'; input.maxLength = 1; input.className = 'answer-input';
                input.id = `answer-${col}`; input.disabled = true;
                input.addEventListener('input', e => handleSubtractionAnswerInput(e));
                div.appendChild(input);
                grid.appendChild(div);
            }
        }

        function updateSubtractionHighlights() {
            const p = problem;
            document.querySelectorAll('.grid-item').forEach(el => el.classList.remove('active-column'));
            document.querySelectorAll('.anno-input').forEach(el => {
                if (!el.classList.contains('locked')) {
                    el.disabled = true;
                    el.value = '';
                    el.className = 'anno-input';
                }
            });
            document.querySelectorAll('.answer-input').forEach(el => el.disabled = true);

            if (p.stepState === 'REDUCE') {
                const col = p.borrowChain[p.chainPos];
                const isTerminal = p.chainPos === 0;
                const expected = isTerminal ? (p.topDigits[col] - 1) : (p.topDigits[col] + 9);
                document.querySelectorAll(`.col-${col}`).forEach(el => el.classList.add('active-column'));
                const el = document.getElementById(`anno-${col}`);
                if (el) { el.maxLength = String(expected).length; el.disabled = false; el.className = 'anno-input red-anno'; el.focus(); }
            } else if (p.stepState === 'BOOST') {
                document.querySelectorAll(`.col-${p.colIndex}`).forEach(el => el.classList.add('active-column'));
                const el = document.getElementById(`anno-${p.colIndex}`);
                if (el) { el.maxLength = 2; el.disabled = false; el.className = 'anno-input green-anno'; el.focus(); }
            } else {
                document.querySelectorAll(`.col-${p.colIndex}`).forEach(el => el.classList.add('active-column'));
                const el = document.getElementById(`answer-${p.colIndex}`);
                if (el) { el.disabled = false; el.focus(); }
            }
        }

        function updateSubtractionInstruction() {
            const box = document.getElementById('instruction-box');
            const p = problem;
            if (p.stepState === 'REDUCE') {
                const col = p.borrowChain[p.chainPos];
                const d = p.topDigits[col];
                const isTerminal = p.chainPos === 0;
                box.innerHTML = isTerminal ? t('subInstrReduceLend', d) : t('subInstrReducePassThrough', d, p.bottomDigits[col]);
            } else if (p.stepState === 'BOOST') {
                box.innerHTML = t('subInstrBoost', p.topDigits[p.colIndex]);
            } else if (p.currentBorrowed) {
                const boosted = p.topDigits[p.colIndex] + 10;
                box.innerHTML = t('subInstrAnswerBoosted', boosted, p.bottomDigits[p.colIndex]);
            } else {
                box.innerHTML = t('subInstrAnswerPlain', p.topDigits[p.colIndex], p.bottomDigits[p.colIndex]);
            }
        }

        function handleAnnoInput(event, col) {
            const p = problem;
            const raw = event.target.value.replace(/\D/g, '');
            event.target.value = raw;
            const feedback = document.getElementById('feedback-message');

            if (p.stepState === 'REDUCE' && p.borrowChain[p.chainPos] === col) {
                const isTerminal = p.chainPos === 0;
                const expected = isTerminal ? (p.topDigits[col] - 1) : (p.topDigits[col] + 9);
                const requiredLen = String(expected).length;
                if (raw.length < requiredLen) return;
                const digitInput = parseInt(raw, 10);
                if (digitInput === expected) {
                    registerCorrect('subtraction');
                    p.topDigits[col] = expected;
                    event.target.value = expected;
                    event.target.disabled = true;
                    event.target.classList.add('locked');
                    document.getElementById(`top-${col}`).classList.add('struck-red');
                    feedback.className = 'feedback correct';
                    feedback.innerText = t('correctBorrow');
                    p.chainPos++;
                    if (p.chainPos >= p.borrowChain.length) {
                        p.stepState = 'BOOST';
                        p.colIndex = p.pendingAnswerCol;
                    }
                    updateSubtractionHighlights();
                    updateSubtractionInstruction();
                } else {
                    feedback.className = 'feedback incorrect';
                    feedback.innerText = t('incorrectBorrow');
                    event.target.value = '';
                }
            } else if (p.stepState === 'BOOST' && p.colIndex === col) {
                if (raw.length < 2) return;
                const digitInput = parseInt(raw, 10);
                const expected = p.topDigits[col] + 10;
                if (digitInput === expected) {
                    registerCorrect('subtraction');
                    event.target.value = expected;
                    event.target.disabled = true;
                    event.target.classList.add('locked');
                    document.getElementById(`top-${col}`).classList.add('struck-green');
                    feedback.className = 'feedback correct';
                    feedback.innerText = t('correctBoost');
                    p.stepState = 'ANSWER';
                    updateSubtractionHighlights();
                    updateSubtractionInstruction();
                } else {
                    feedback.className = 'feedback incorrect';
                    feedback.innerText = t('incorrectBoost');
                    event.target.value = '';
                }
            }
        }

        function handleSubtractionAnswerInput(event) {
            const val = event.target.value;
            if (!/^\d$/.test(val)) { event.target.value = ''; return; }
            const digitInput = parseInt(val, 10);
            const p = problem;
            const col = p.colIndex;
            const topVal = p.currentBorrowed ? p.topDigits[col] + 10 : p.topDigits[col];
            const expected = topVal - p.bottomDigits[col];
            const feedback = document.getElementById('feedback-message');

            if (digitInput === expected) {
                registerCorrect('subtraction');
                event.target.classList.add('locked-answer');
                feedback.className = 'feedback correct';
                feedback.innerText = t('correctDigit');
                if (col >= p.colCount - 1) {
                    finishSubtraction();
                } else {
                    setupSubtractionColumn(p, col + 1);
                    updateSubtractionHighlights();
                    updateSubtractionInstruction();
                }
            } else {
                feedback.className = 'feedback incorrect';
                feedback.innerText = t('incorrectDigitTry');
                event.target.value = '';
            }
        }

        function finishSubtraction() {
            const p = problem;
            document.querySelectorAll('.anno-input, .answer-input').forEach(el => el.disabled = true);
            document.getElementById('next-btn').classList.remove('hidden');
            document.getElementById('instruction-box').innerHTML = t('clickNext');
            const feedback = document.getElementById('feedback-message');
            feedback.className = 'feedback correct';
            feedback.innerText = t('problemSolvedSub', p.num1, p.num2, p.num1 - p.num2);
        }

        /* ---------- Division engine ---------- */

        function currentChunkValue(p) { return p.runningRemainder * 10 + p.digits[p.pos]; }

        function divCycleColor(p, pos) {
            return ((pos - p.startPos) % 2 === 0) ? 'div-color-a' : 'div-color-b';
        }

        function setupDivisionActiveRow(p) {
            if (p.stepState === 'SUBTRAHEND') {
                const product = p.quotientDigits[p.pos] * p.divisor;
                const str = String(product);
                p.activeRow = { type: 'product', startCol: p.pos - str.length + 1, expected: str, entered: new Array(str.length).fill(null) };
            } else if (p.stepState === 'DIFFERENCE') {
                const chunk = currentChunkValue(p);
                const product = p.quotientDigits[p.pos] * p.divisor;
                const diff = chunk - product;
                const str = String(diff);
                p.activeRow = { type: 'difference', startCol: p.pos - str.length + 1, expected: str, entered: new Array(str.length).fill(null) };
            } else {
                p.activeRow = null;
            }
        }

        function totalDivCols(p) { return p.n + 2; }

        function appendDivGutter(grid) {
            const g = document.createElement('div');
            g.className = 'div-cell';
            grid.appendChild(g);
        }

        function buildDivisionGrid(grid) {
            const p = problem;
            setupDivisionActiveRow(p);
            renderDivisionBoard(grid);
        }

        function renderDivisionBoard(gridArg) {
            const p = problem;
            const grid = gridArg || document.getElementById('math-grid');
            grid.className = 'division-grid';
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(${totalDivCols(p)}, 40px)`;

            appendDivGutter(grid);
            for (let col = 0; col < p.n; col++) {
                const cell = document.createElement('div');
                cell.className = 'div-cell';
                if (col < p.startPos) {
                    const box = document.createElement('div');
                    box.className = 'div-box div-box-static';
                    cell.appendChild(box);
                } else if (p.quotientDigits[col] !== undefined) {
                    const box = document.createElement('div');
                    box.className = `div-box div-box-filled ${divCycleColor(p, col)}`;
                    box.textContent = p.quotientDigits[col];
                    cell.appendChild(box);
                } else if (p.stepState === 'QUOTIENT' && col === p.pos) {
                    const input = document.createElement('input');
                    input.type = 'text'; input.maxLength = 1; input.className = 'div-input';
                    input.addEventListener('input', handleDivisionQuotientInput);
                    cell.appendChild(input);
                }
                grid.appendChild(cell);
            }
            appendDivGutter(grid);

            const line = document.createElement('div');
            line.className = 'div-line-row';
            grid.appendChild(line);

            appendDivGutter(grid);
            for (let col = 0; col < p.n; col++) {
                const cell = document.createElement('div');
                cell.className = 'div-cell';
                cell.textContent = p.digits[col];
                grid.appendChild(cell);
            }
            const divisorCell = document.createElement('div');
            divisorCell.className = 'div-cell div-divisor-label';
            divisorCell.textContent = `: ${p.divisor}`;
            grid.appendChild(divisorCell);

            p.rows.forEach(row => renderCommittedDivRow(grid, p, row));

            if (p.activeRow) renderActiveDivRow(grid, p);

            const focusEl = grid.querySelector('.div-input:not(:disabled)');
            if (focusEl) focusEl.focus();
        }

        function renderCommittedDivRow(grid, p, row) {
            const gutter = document.createElement('div');
            gutter.className = 'div-cell';
            if (row.type === 'product') {
                const sign = document.createElement('span');
                sign.className = `div-minus-sign ${row.color}`;
                sign.textContent = '−';
                gutter.appendChild(sign);
            }
            grid.appendChild(gutter);

            for (let col = 0; col < p.n; col++) {
                const cell = document.createElement('div');
                cell.className = 'div-cell';
                if (col >= row.startCol && col <= row.endCol) {
                    const box = document.createElement('div');
                    box.className = `div-box div-box-filled ${row.type === 'product' ? row.color : ''}`;
                    box.textContent = row.digits[col - row.startCol];
                    cell.appendChild(box);
                } else if (row.extraDigit && col === row.extraDigit.col) {
                    const box = document.createElement('div');
                    box.className = 'div-box div-box-filled';
                    box.textContent = row.extraDigit.value;
                    cell.appendChild(box);
                }
                grid.appendChild(cell);
            }
            appendDivGutter(grid);
        }

        function renderActiveDivRow(grid, p) {
            const row = p.activeRow;
            const color = row.type === 'product' ? divCycleColor(p, p.pos) : null;
            const nextIndex = row.entered.findIndex(v => v === null);

            const gutter = document.createElement('div');
            gutter.className = 'div-cell';
            if (row.type === 'product') {
                const sign = document.createElement('span');
                sign.className = `div-minus-sign ${color}`;
                sign.textContent = '−';
                gutter.appendChild(sign);
            }
            grid.appendChild(gutter);

            for (let col = 0; col < p.n; col++) {
                const cell = document.createElement('div');
                cell.className = 'div-cell';
                const idx = col - row.startCol;
                if (idx >= 0 && idx < row.expected.length) {
                    if (row.entered[idx] !== null) {
                        const box = document.createElement('div');
                        box.className = `div-box div-box-filled ${color || ''}`;
                        box.textContent = row.entered[idx];
                        cell.appendChild(box);
                    } else if (idx === nextIndex) {
                        const input = document.createElement('input');
                        input.type = 'text'; input.maxLength = 1; input.className = 'div-input';
                        input.addEventListener('input', e => handleDivisionBoxInput(e, idx));
                        cell.appendChild(input);
                    } else {
                        const box = document.createElement('div');
                        box.className = 'div-box div-box-static';
                        cell.appendChild(box);
                    }
                }
                grid.appendChild(cell);
            }
            appendDivGutter(grid);
        }

        function updateDivisionHighlights() {
            renderDivisionBoard();
        }

        function divisionInstructionHTML() {
            const p = problem;
            const value = currentChunkValue(p);
            if (p.stepState === 'QUOTIENT') {
                return t('divInstrQuotient', value, p.divisor);
            }
            const q = p.quotientDigits[p.pos];
            if (p.stepState === 'SUBTRAHEND') {
                return t('divInstrSubtrahend', p.divisor, q, value);
            }
            const product = p.divisor * q;
            return t('divInstrDifference', value, product);
        }

        function handleDivisionQuotientInput(event) {
            const p = problem;
            const val = event.target.value;
            if (!/^\d$/.test(val)) { event.target.value = ''; return; }
            const digitInput = parseInt(val, 10);
            const expected = Math.floor(currentChunkValue(p) / p.divisor);
            const feedback = document.getElementById('feedback-message');
            if (digitInput === expected) {
                registerCorrect('division');
                feedback.className = 'feedback correct';
                feedback.innerText = t('correctQuotient');
                p.quotientDigits[p.pos] = digitInput;
                p.stepState = 'SUBTRAHEND';
                setupDivisionActiveRow(p);
                updateHighlights(); updateInstruction();
            } else {
                feedback.className = 'feedback incorrect';
                feedback.innerText = t('incorrectQuotient');
                event.target.value = '';
            }
        }

        function handleDivisionBoxInput(event, idx) {
            const p = problem;
            const val = event.target.value;
            if (!/^\d$/.test(val)) { event.target.value = ''; return; }
            const digitInput = parseInt(val, 10);
            const expectedDigit = parseInt(p.activeRow.expected[idx], 10);
            const feedback = document.getElementById('feedback-message');
            const isProduct = p.activeRow.type === 'product';
            if (digitInput === expectedDigit) {
                registerCorrect('division');
                feedback.className = 'feedback correct';
                feedback.innerText = isProduct ? t('correctSubtrahendDigit') : t('correctDifferenceDigit');
                p.activeRow.entered[idx] = digitInput;
                if (p.activeRow.entered.every(v => v !== null)) {
                    commitActiveDivisionRow();
                } else {
                    updateHighlights(); updateInstruction();
                }
            } else {
                feedback.className = 'feedback incorrect';
                feedback.innerText = isProduct ? t('incorrectSubtrahendDigit') : t('incorrectDifferenceDigit');
                event.target.value = '';
            }
        }

        function commitActiveDivisionRow() {
            const p = problem;
            const row = p.activeRow;
            if (row.type === 'product') {
                const color = divCycleColor(p, p.pos);
                p.rows.push({ type: 'product', startCol: row.startCol, endCol: p.pos, digits: row.entered.slice(), color });
                p.stepState = 'DIFFERENCE';
                setupDivisionActiveRow(p);
                updateHighlights(); updateInstruction();
            } else {
                const hasNext = p.pos < p.n - 1;
                const extraDigit = hasNext ? { col: p.pos + 1, value: p.digits[p.pos + 1] } : null;
                p.rows.push({ type: 'difference', startCol: row.startCol, endCol: p.pos, digits: row.entered.slice(), extraDigit });
                p.runningRemainder = parseInt(row.expected, 10);
                p.activeRow = null;
                if (!hasNext) {
                    finishDivision();
                } else {
                    p.pos++;
                    p.stepState = 'QUOTIENT';
                    updateHighlights(); updateInstruction();
                }
            }
        }

        function finishDivision() {
            const p = problem;
            p.stepState = 'DONE';
            updateHighlights();
            document.getElementById('next-btn').classList.remove('hidden');
            document.getElementById('instruction-box').innerHTML = t('clickNext');
            let qStr = '';
            for (let col = p.startPos; col < p.n; col++) qStr += p.quotientDigits[col];
            const quotient = parseInt(qStr, 10);
            const remainder = p.runningRemainder;
            const feedback = document.getElementById('feedback-message');
            feedback.className = 'feedback correct';
            feedback.innerText = t('problemSolvedDiv', p.dividend, p.divisor, quotient, remainder);
        }

        /* ---------- Exam mode ---------- */

        function genExamProblem(type, index, total) {
            const tier = digitTier(index + 1, total);
            if (type === 'addition') {
                const num1 = genNumber(tier);
                const num2 = genNumber(tier);
                const answer = num1 + num2;
                return { type, num1, num2, answer, answerLen: numLen(answer) };
            }
            if (type === 'subtraction') {
                let num1 = genNumber(tier);
                let num2 = genNumber(tier);
                if (num1 < num2) { const tmp = num1; num1 = num2; num2 = tmp; }
                const answer = num1 - num2;
                return { type, num1, num2, answer, answerLen: numLen(answer) };
            }
            if (type === 'multiplication') {
                const num1 = genNumber(tier);
                const multiplier = randInt(2, 9);
                const answer = num1 * multiplier;
                return { type, num1, num2: multiplier, answer, answerLen: numLen(answer) };
            }
            const dividend = genNumber(tier);
            const divisor = randInt(2, 9);
            const answer = Math.floor(dividend / divisor);
            const remainder = dividend % divisor;
            return { type, num1: dividend, num2: divisor, answer, remainder, answerLen: numLen(answer) };
        }

        function buildExamTypeSequence(types, count) {
            const seq = [];
            for (let i = 0; i < count; i++) seq.push(types[i % types.length]);
            for (let i = seq.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [seq[i], seq[j]] = [seq[j], seq[i]];
            }
            return seq;
        }

        function startExam() {
            if (selectedTypes.length === 0) {
                document.getElementById('select-warning').classList.remove('hidden');
                return;
            }
            const examCount = parseInt(document.getElementById('equations-select').value, 10);
            const seq = buildExamTypeSequence(selectedTypes, examCount);
            examProblems = seq.map((type, i) => genExamProblem(type, i, examCount));
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('exam-screen').classList.remove('hidden');
            refreshExamScreenText();
            buildExamGrid();
        }

        function refreshExamScreenText() {
            document.getElementById('exam-title').textContent = t('examTitle');
            document.getElementById('lang-toggle-exam').textContent = lang === 'en' ? 'PL' : 'EN';
            document.getElementById('menu-btn-exam').textContent = t('menu');
            document.getElementById('check-answers-btn').textContent = t('checkAnswersBtn');
            document.querySelectorAll('.exam-r-label').forEach(el => { el.textContent = t('remainderLabel'); });
        }

        function handleExamDigitInput(event) {
            const val = event.target.value;
            if (!/^\d$/.test(val)) { event.target.value = ''; return; }
            const allInputs = Array.from(document.querySelectorAll('.exam-input'));
            const idx = allInputs.indexOf(event.target);
            if (idx >= 0 && idx < allInputs.length - 1) allInputs[idx + 1].focus();
        }

        function buildExamColumnarCard(card, p, i) {
            const opSymbol = p.type === 'addition' ? '+' : (p.type === 'subtraction' ? '−' : '×');
            const width = Math.max(numLen(p.num1), numLen(p.num2), p.answerLen);
            const mini = document.createElement('div');
            mini.className = 'exam-mini-grid';
            mini.style.gridTemplateColumns = `repeat(${width + 1}, 34px)`;
            const s1 = p.num1.toString().padStart(width, ' ');
            const s2 = p.num2.toString().padStart(width, ' ');

            const scratchGutter = document.createElement('div');
            scratchGutter.className = 'exam-cell exam-scratch-row';
            mini.appendChild(scratchGutter);
            for (let k = 0; k < width; k++) {
                const cell = document.createElement('div');
                cell.className = 'exam-cell exam-scratch-row';
                const input = document.createElement('input');
                input.type = 'text'; input.maxLength = 2; input.className = 'exam-scratch-input';
                input.addEventListener('input', e => { e.target.value = e.target.value.replace(/\D/g, ''); });
                cell.appendChild(input);
                mini.appendChild(cell);
            }

            const gutter1 = document.createElement('div');
            gutter1.className = 'exam-cell';
            mini.appendChild(gutter1);
            for (let k = 0; k < width; k++) {
                const cell = document.createElement('div');
                cell.className = 'exam-cell';
                if (s1[k] !== ' ') {
                    const digitSpan = document.createElement('span');
                    digitSpan.className = 'exam-top-digit';
                    digitSpan.innerText = s1[k];
                    digitSpan.addEventListener('click', () => {
                        if (document.getElementById('check-answers-btn').classList.contains('hidden')) return;
                        digitSpan.classList.toggle('struck');
                    });
                    cell.appendChild(digitSpan);
                }
                mini.appendChild(cell);
            }

            const opCell = document.createElement('div');
            opCell.className = 'exam-cell';
            const opSpan = document.createElement('span');
            opSpan.innerText = opSymbol;
            opCell.appendChild(opSpan);
            mini.appendChild(opCell);
            for (let k = 0; k < width; k++) {
                const cell = document.createElement('div');
                cell.className = 'exam-cell';
                cell.innerText = s2[k] === ' ' ? '' : s2[k];
                mini.appendChild(cell);
            }

            const line = document.createElement('div');
            line.className = 'exam-line';
            mini.appendChild(line);

            const gutter3 = document.createElement('div');
            gutter3.className = 'exam-cell';
            mini.appendChild(gutter3);
            const ansPad = width - p.answerLen;
            for (let k = 0; k < width; k++) {
                const cell = document.createElement('div');
                cell.className = 'exam-cell';
                if (k >= ansPad) {
                    const input = document.createElement('input');
                    input.type = 'text'; input.maxLength = 1; input.className = 'exam-input';
                    input.id = `exam-ans-${i}-${k - ansPad}`;
                    input.addEventListener('input', handleExamDigitInput);
                    cell.appendChild(input);
                }
                mini.appendChild(cell);
            }
            card.appendChild(mini);
        }

        function addExamDivScratchRow(grid, scratchState) {
            const cells = [];
            for (let col = 0; col < scratchState.n; col++) {
                const cell = document.createElement('div');
                cell.className = 'exam-cell';
                const input = document.createElement('input');
                input.type = 'text'; input.maxLength = 2; input.className = 'exam-scratch-input';
                input.addEventListener('input', (e) => {
                    e.target.value = e.target.value.replace(/\D/g, '');
                    if (cells === scratchState.lastCells && cells.some(c => c.value !== '')) {
                        scratchState.lastCells = addExamDivScratchRow(grid, scratchState);
                    }
                });
                cell.appendChild(input);
                grid.appendChild(cell);
                cells.push(input);
            }
            grid.appendChild(document.createElement('div'));
            return cells;
        }

        function buildExamDivisionCard(card, p, i) {
            const digits = p.num1.toString().split('').map(Number);
            const n = digits.length;
            const startPos = n - p.answerLen;

            const grid = document.createElement('div');
            grid.className = 'exam-div-grid';
            grid.style.gridTemplateColumns = `repeat(${n + 1}, 34px)`;

            for (let col = 0; col < n; col++) {
                const cell = document.createElement('div');
                cell.className = 'exam-cell';
                if (col < startPos) {
                    const box = document.createElement('div');
                    box.className = 'exam-div-box-static';
                    cell.appendChild(box);
                } else {
                    const input = document.createElement('input');
                    input.type = 'text'; input.maxLength = 1; input.className = 'exam-input';
                    input.id = `exam-q-${i}-${col - startPos}`;
                    input.addEventListener('input', handleExamDigitInput);
                    cell.appendChild(input);
                }
                grid.appendChild(cell);
            }
            grid.appendChild(document.createElement('div'));

            const line = document.createElement('div');
            line.className = 'exam-div-line';
            grid.appendChild(line);

            digits.forEach(d => {
                const cell = document.createElement('div');
                cell.className = 'exam-cell';
                cell.textContent = d;
                grid.appendChild(cell);
            });
            const divisorCell = document.createElement('div');
            divisorCell.className = 'exam-cell exam-div-divisor-label';
            divisorCell.textContent = `: ${p.num2}`;
            grid.appendChild(divisorCell);

            const scratchState = { n, lastCells: null };
            scratchState.lastCells = addExamDivScratchRow(grid, scratchState);

            card.appendChild(grid);

            const rRow = document.createElement('div');
            rRow.className = 'exam-remainder-row';
            const rLabel = document.createElement('span');
            rLabel.className = 'exam-r-label';
            rLabel.textContent = t('remainderLabel');
            const rInput = document.createElement('input');
            rInput.type = 'text'; rInput.maxLength = 1; rInput.className = 'exam-input';
            rInput.id = `exam-r-${i}`;
            rInput.addEventListener('input', handleExamDigitInput);
            rRow.appendChild(rLabel);
            rRow.appendChild(rInput);
            card.appendChild(rRow);
        }

        function buildExamGrid() {
            const grid = document.getElementById('exam-grid');
            grid.innerHTML = '';
            examProblems.forEach((p, i) => {
                const card = document.createElement('div');
                card.className = 'exam-card';
                card.id = `exam-card-${i}`;
                if (p.type === 'division') buildExamDivisionCard(card, p, i);
                else buildExamColumnarCard(card, p, i);
                const fb = document.createElement('div');
                fb.className = 'exam-feedback';
                fb.id = `exam-feedback-${i}`;
                card.appendChild(fb);
                grid.appendChild(card);
            });
            document.getElementById('exam-summary').classList.add('hidden');
            document.getElementById('check-answers-btn').classList.remove('hidden');
            document.getElementById('exam-menu-btn').classList.add('hidden');
        }

        function registerExamCorrect(type) {
            stats[type] = (stats[type] || 0) + 1;
            saveStats();
        }

        function checkExamAnswers() {
            let correctCount = 0;
            examProblems.forEach((p, i) => {
                let userCorrect;
                if (p.type === 'division') {
                    let qStr = '';
                    for (let k = 0; k < p.answerLen; k++) {
                        const el = document.getElementById(`exam-q-${i}-${k}`);
                        qStr += (el && el.value) ? el.value : '_';
                    }
                    const rEl = document.getElementById(`exam-r-${i}`);
                    const rVal = (rEl && rEl.value) ? parseInt(rEl.value, 10) : NaN;
                    const qVal = parseInt(qStr, 10);
                    userCorrect = qVal === p.answer && rVal === p.remainder;
                } else {
                    let ansStr = '';
                    for (let k = 0; k < p.answerLen; k++) {
                        const el = document.getElementById(`exam-ans-${i}-${k}`);
                        ansStr += (el && el.value) ? el.value : '_';
                    }
                    userCorrect = parseInt(ansStr, 10) === p.answer;
                }

                const card = document.getElementById(`exam-card-${i}`);
                const fb = document.getElementById(`exam-feedback-${i}`);
                card.querySelectorAll('input').forEach(el => el.disabled = true);

                if (userCorrect) {
                    correctCount++;
                    card.classList.add('correct');
                    fb.className = 'exam-feedback correct-fb';
                    fb.innerHTML = '&#10003;';
                    registerExamCorrect(p.type);
                } else {
                    card.classList.add('incorrect');
                    fb.className = 'exam-feedback incorrect-fb';
                    fb.textContent = p.type === 'division'
                        ? t('correctAnswerIsDiv', p.answer, p.remainder)
                        : t('correctAnswerIs', p.answer);
                }
            });

            const total = examProblems.length;
            const pct = Math.round((correctCount / total) * 100);
            const points = correctCount * 10;
            const passed = correctCount / total > 0.5;

            const summary = document.getElementById('exam-summary');
            summary.classList.remove('hidden');
            summary.className = 'exam-summary ' + (passed ? 'pass' : 'fail');
            document.getElementById('exam-score-text').textContent = t('examScoreText', correctCount, total, pct, points);
            document.getElementById('exam-pass-text').textContent = passed ? t('examPass') : t('examFail');
            document.getElementById('check-answers-btn').classList.add('hidden');
            document.getElementById('exam-menu-btn').classList.remove('hidden');
        }

        /* ---------- Dispatch layer ---------- */

        function buildGrid() {
            const grid = document.getElementById('math-grid');
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = '';
            if (problem.type === 'division') {
                buildDivisionGrid(grid);
            } else if (problem.type === 'subtraction') {
                grid.className = 'math-container';
                buildSubtractionGrid(grid);
            } else {
                grid.className = 'math-container';
                buildColumnarGrid(grid);
            }
        }

        function updateHighlights() {
            if (problem.type === 'division') updateDivisionHighlights();
            else if (problem.type === 'subtraction') updateSubtractionHighlights();
            else updateColumnarHighlights();
        }

        function updateInstruction() {
            const box = document.getElementById('instruction-box');
            if (problem.type === 'division') box.innerHTML = divisionInstructionHTML();
            else if (problem.type === 'subtraction') updateSubtractionInstruction();
            else updateColumnarInstruction();
        }

        function registerCorrect(type) {
            score += 10;
            stats[type] = (stats[type] || 0) + 1;
            saveStats();
            document.getElementById('score-tracker').textContent = t('score', score);
        }

        function updateRoundScoreText() {
            document.getElementById('round-tracker').textContent = t('round', currentRound, totalRounds);
            document.getElementById('score-tracker').textContent = t('score', score);
        }

        function generateRound() {
            document.getElementById('lang-toggle-game').textContent = lang === 'en' ? 'PL' : 'EN';
            updateRoundScoreText();
            document.getElementById('feedback-message').className = 'feedback';
            document.getElementById('feedback-message').innerText = '';
            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('next-btn').textContent = t('nextRound');

            const type = selectedTypes[Math.floor(Math.random() * selectedTypes.length)];
            problem = generateProblem(type, currentRound, totalRounds);
            buildGrid();
            updateHighlights();
            updateInstruction();
        }

        function nextRound() {
            if (currentRound < totalRounds) {
                currentRound++;
                generateRound();
            } else {
                document.getElementById('game-screen').classList.add('hidden');
                document.getElementById('end-screen').classList.remove('hidden');
                renderEndScreen();
            }
        }

        function renderEndScreen() {
            document.getElementById('end-title').textContent = t('congrats');
            document.getElementById('end-message').textContent = t('finishedAll');
            document.getElementById('final-score').textContent = t('finalScore', score);
            document.getElementById('play-again-btn').textContent = t('playAgain');
            document.getElementById('lang-toggle-end').textContent = lang === 'en' ? 'PL' : 'EN';
        }

        renderMenu();
    </script>
</body>
</html>
