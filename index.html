<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Column Math Master</title>
    <style>
        :root {
            --primary: #4a90e2;
            --success: #2ec4b6;
            --error: #e71d36;
            --background: #f8f9fa;
            --text: #2b2d42;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 520px;
            text-align: center;
        }

        h1 { color: var(--primary); margin-top: 0; }

        .hidden { display: none !important; }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #357abd; }

        .btn.small {
            padding: 6px 14px;
            font-size: 0.85rem;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        select {
            padding: 10px;
            font-size: 1rem;
            border-radius: 5px;
            border: 2px solid #ccc;
            margin-bottom: 20px;
            width: 100px;
        }

        .op-list {
            text-align: left;
            margin: 15px 0;
        }

        .op-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border: 2px solid #eef0f2;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
        }
        .op-item:hover { border-color: var(--primary); }

        .op-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .op-name {
            font-weight: bold;
            flex: 1;
        }

        .op-stat {
            font-size: 0.8rem;
            color: #7f8c8d;
        }

        .warning {
            color: var(--error);
            font-size: 0.9rem;
            min-height: 20px;
        }

        /* Math Board Styling */
        .math-container {
            display: inline-grid;
            grid-template-columns: repeat(5, 50px);
            grid-gap: 5px;
            margin: 30px auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 2rem;
            font-weight: bold;
            align-items: center;
            justify-content: center;
        }

        .grid-item {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .carry-row {
            font-size: 1.2rem;
            color: #7f8c8d;
            height: 35px;
        }

        .carry-input, .answer-input, .top-input {
            width: 40px;
            height: 40px;
            font-size: 1.5rem;
            text-align: center;
            border: 2px solid #bdc3c7;
            border-radius: 5px;
            font-family: inherit;
            font-weight: bold;
        }

        .carry-input {
            width: 30px;
            height: 30px;
            font-size: 1.1rem;
        }

        .carry-input:focus, .answer-input:focus, .top-input:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #eef5fc;
        }

        .anno-row {
            height: 38px;
        }

        .anno-input {
            width: 40px;
            height: 34px;
            font-size: 1.05rem;
            text-align: center;
            border: 2px solid #bdc3c7;
            border-radius: 5px;
            font-family: inherit;
            font-weight: bold;
            background-color: white;
        }

        .anno-input:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #eef5fc;
        }

        .anno-input:disabled {
            opacity: 1;
            background-color: white;
        }

        .anno-input.red-anno {
            color: var(--error);
            border-color: #f3b7bf;
        }

        .anno-input.green-anno {
            color: var(--success);
            border-color: #a9e0da;
        }

        .top-digit.struck-red {
            text-decoration: line-through;
            text-decoration-color: var(--error);
            text-decoration-thickness: 3px;
        }

        .top-digit.struck-green {
            color: var(--success);
            text-decoration: line-through;
            text-decoration-color: var(--success);
            text-decoration-thickness: 3px;
        }

        .answer-input.locked-answer {
            color: var(--primary);
        }

        .active-column {
            background-color: rgba(74, 144, 226, 0.15);
            border-radius: 5px;
        }

        .operator {
            grid-column: 1;
            text-align: center;
        }

        .line-row {
            grid-column: 1 / -1;
            border-bottom: 4px solid var(--text);
            height: 0;
            margin: 5px 0;
        }

        .feedback {
            margin-top: 15px;
            font-weight: bold;
            min-height: 24px;
        }
        .correct { color: var(--success); }
        .incorrect { color: var(--error); }

        .instructions {
            background: #eef5fc;
            padding: 10px;
            border-left: 5px solid var(--primary);
            border-radius: 4px;
            font-size: 0.95rem;
            margin-bottom: 20px;
            text-align: left;
        }

        /* Division board (column-aligned, dividend : divisor) */
        .division-grid {
            display: inline-grid;
            grid-gap: 4px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 1.3rem;
            margin: 20px auto;
            justify-content: center;
        }

        .div-cell {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .div-box {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .div-box-static {
            border: 2px solid #cfd6dd;
            border-radius: 5px;
        }

        .div-input {
            width: 36px;
            height: 36px;
            font-size: 1.2rem;
            text-align: center;
            border: 2px solid #bdc3c7;
            border-radius: 5px;
            font-family: inherit;
            font-weight: bold;
        }

        .div-input:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #eef5fc;
        }

        .div-line-row {
            grid-column: 1 / -1;
            border-bottom: 3px solid var(--text);
            height: 0;
            margin: 3px 0;
        }

        .div-divisor-label {
            justify-content: flex-start;
            white-space: nowrap;
            width: auto;
        }

        .div-minus-sign {
            font-size: 1.3rem;
        }

        .div-color-a { color: #2ec4b6; }
        .div-color-b { color: #9b59b6; }

        /* Exam mode */
        .mode-tabs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .mode-tab {
            flex: 1;
            max-width: 160px;
            padding: 10px;
            border: 2px solid var(--primary);
            background: white;
            color: var(--primary);
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
        }

        .mode-tab.active {
            background: var(--primary);
            color: white;
        }

        .exam-card-wrapper {
            max-width: 1000px !important;
        }

        .exam-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin: 25px 0;
        }

        .exam-card {
            border: 2px solid #eef0f2;
            border-radius: 10px;
            padding: 15px;
            width: 250px;
            text-align: center;
        }

        .exam-card.correct {
            border-color: var(--success);
            background: rgba(46, 196, 182, 0.08);
        }

        .exam-card.incorrect {
            border-color: var(--error);
            background: rgba(231, 29, 54, 0.06);
        }

        .exam-mini-grid {
            display: inline-grid;
            grid-gap: 4px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 1.3rem;
            margin: 5px 0;
        }

        .exam-cell {
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .exam-input {
            width: 30px;
            height: 34px;
            font-size: 1.1rem;
            text-align: center;
            border: 2px solid #bdc3c7;
            border-radius: 5px;
            font-family: inherit;
            font-weight: bold;
        }

        .exam-input:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #eef5fc;
        }

        .exam-input:disabled {
            opacity: 1;
            background-color: white;
            color: var(--text);
        }

        .exam-line {
            grid-column: 1 / -1;
            border-bottom: 3px solid var(--text);
            height: 0;
            margin: 3px 0;
        }

        .exam-scratch-row {
            height: 26px;
        }

        .exam-scratch-input {
            width: 26px;
            height: 22px;
            font-size: 0.85rem;
            text-align: center;
            border: 2px dashed #cfd6dd;
            border-radius: 4px;
            font-family: inherit;
            font-weight: bold;
            color: #7f8c8d;
            background: transparent;
        }

        .exam-scratch-input:focus {
            outline: none;
            border-color: var(--primary);
            border-style: solid;
            background-color: #eef5fc;
        }

        .exam-scratch-input:disabled {
            opacity: 0.7;
        }

        .exam-top-digit {
            cursor: pointer;
            user-select: none;
            padding: 2px 4px;
            border-radius: 4px;
        }

        .exam-top-digit:hover {
            background-color: rgba(74, 144, 226, 0.12);
        }

        .exam-top-digit.struck {
            color: var(--error);
            text-decoration: line-through;
            text-decoration-color: var(--error);
            text-decoration-thickness: 3px;
        }

        .exam-div-grid {
            display: inline-grid;
            grid-gap: 4px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 1.3rem;
            margin: 5px 0;
        }

        .exam-div-box-static {
            width: 30px;
            height: 30px;
            margin: 0 auto;
            border: 2px solid #cfd6dd;
            border-radius: 5px;
        }

        .exam-div-line {
            grid-column: 1 / -1;
            border-bottom: 3px solid var(--text);
            height: 0;
            margin: 3px 0;
        }

        .exam-div-divisor-label {
            justify-content: flex-start;
            white-space: nowrap;
            width: auto;
        }

        .exam-remainder-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin-top: 10px;
        }

        .exam-r-label {
            font-size: 0.8rem;
            font-family: inherit;
            font-weight: normal;
            color: #7f8c8d;
            margin-right: 4px;
        }

        .exam-feedback {
            margin-top: 12px;
            font-weight: bold;
            min-height: 22px;
        }

        .exam-feedback.correct-fb {
            color: var(--success);
            font-size: 1.6rem;
        }

        .exam-feedback.incorrect-fb {
            color: var(--error);
            font-size: 0.85rem;
        }

        .exam-summary {
            margin: 20px 0;
        }

        .exam-summary.pass h2 {
            color: var(--success);
        }

        .exam-summary.fail h2 {
            color: var(--error);
        }
    </style>
</head>
<body>

    <div id="setup-screen" class="card">
        <div class="topbar">
            <span></span>
            <button class="btn small" id="lang-toggle" onclick="toggleLang()">PL</button>
        </div>
        <h1 id="menu-title">Column Math Master</h1>
        <p id="menu-tagline">Learn written math, one step at a time!</p>

        <div class="mode-tabs">
            <button class="mode-tab active" id="tab-practice" onclick="switchMode('practice')">Practice</button>
            <button class="mode-tab" id="tab-exam" onclick="switchMode('exam')">Exam</button>
        </div>

        <p id="choose-ops-label" style="text-align:left; font-weight:bold; margin-bottom:5px;">Choose what to practice:</p>
        <div class="op-list" id="op-list"></div>
        <p class="warning hidden" id="select-warning"></p>

        <div id="practice-options">
            <label id="rounds-label" for="round-select"><strong>Number of rounds:</strong></label><br><br>
            <select id="round-select">
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10" selected>10</option>
            </select>
            <br>
            <button class="btn" id="start-btn" onclick="startGame()">Start Game</button>
        </div>

        <div id="exam-options" class="hidden">
            <label id="equations-label" for="equations-select"><strong>Number of equations:</strong></label><br><br>
            <select id="equations-select">
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6" selected>6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
            </select>
            <br>
            <button class="btn" id="start-exam-btn" onclick="startExam()">Start Exam</button>
        </div>
    </div>

    <div id="game-screen" class="card hidden">
        <div class="topbar">
            <button class="btn small" onclick="backToMenu()" id="menu-btn-game">Menu</button>
            <button class="btn small" id="lang-toggle-game" onclick="toggleLang()">PL</button>
        </div>
        <div style="display: flex; justify-content: space-between; font-weight: bold;">
            <span id="round-tracker">Round 1 of 5</span>
            <span id="score-tracker">Score: 0</span>
        </div>

        <div class="instructions" id="instruction-box">
            Look at the highlighted column and solve it!
        </div>

        <div class="math-container" id="math-grid"></div>

        <div id="feedback-message" class="feedback"></div>
        <button id="next-btn" class="btn hidden" onclick="nextRound()">Next Round</button>
    </div>

    <div id="end-screen" class="card hidden">
        <div class="topbar">
            <span></span>
            <button class="btn small" id="lang-toggle-end" onclick="toggleLang()">PL</button>
        </div>
        <h1 id="end-title">Congratulations! 🎉</h1>
        <p id="end-message">You have finished all the rounds!</p>
        <h2 id="final-score">Final Score: 0</h2>
        <button class="btn" id="play-again-btn" onclick="backToMenu()">Play Again</button>
    </div>

    <div id="exam-screen" class="card exam-card-wrapper hidden">
        <div class="topbar">
            <button class="btn small" onclick="backToMenu()" id="menu-btn-exam">Menu</button>
            <button class="btn small" id="lang-toggle-exam" onclick="toggleLang()">PL</button>
        </div>
        <h1 id="exam-title">Exam</h1>

        <div class="exam-grid" id="exam-grid"></div>

        <div id="exam-summary" class="exam-summary hidden">
            <h2 id="exam-score-text"></h2>
            <p id="exam-pass-text"></p>
        </div>

        <button id="check-answers-btn" class="btn" onclick="checkExamAnswers()">Check Answers</button>
        <button id="exam-menu-btn" class="btn hidden" onclick="backToMenu()">Back to Menu</button>
    </div>

    <script>
        const translations = {
            en: {
                appTitle: 'Column Math Master',
                menuTagline: 'Learn written math, one step at a time!',
                chooseOperations: 'Choose what to practice:',
                operationAddition: 'Addition',
                operationSubtraction: 'Subtraction',
                operationMultiplication: 'Multiplication',
                operationDivision: 'Division',
                correctAnswersLabel: 'Correct answers:',
                chooseRounds: 'Number of rounds:',
                startGame: 'Start Game',
                selectAtLeastOne: 'Please choose at least one operation to practice.',
                menu: 'Menu',
                round: (c, t) => `Round ${c} of ${t}`,
                score: (s) => `Score: ${s}`,
                nextRound: 'Next Round',
                playAgain: 'Play Again',
                congrats: 'Congratulations! 🎉',
                finishedAll: 'You have finished all the rounds. Great job practicing written math!',
                finalScore: (s) => `Final Score: ${s}`,
                correctDigit: 'Correct digit!',
                correctCarry: 'Correct carry!',
                correctBorrow: 'Correct borrow!',
                correctQuotient: 'Correct quotient digit!',
                correctSubtrahendDigit: 'Correct!',
                correctDifferenceDigit: 'Correct!',
                incorrectDigitTry: 'Oops, try that column again.',
                incorrectCarry: 'Incorrect carry value. Look at the tens place of your column sum!',
                incorrectBorrow: 'Incorrect borrow value. Did you need to borrow from the next column? (0 or 1)',
                incorrectQuotient: 'Incorrect quotient digit. How many whole times does the divisor fit into this value?',
                incorrectSubtrahendDigit: 'Not quite — check your multiplication (divisor × quotient digit).',
                incorrectDifferenceDigit: 'Not quite — check your subtraction.',
                remainderLabel: 'Remainder:',
                clickNext: "Click 'Next Round' to proceed!",
                addInstrAnswer: (d1, d2, cin, sum) => cin > 0
                    ? `Add column values plus your carry: <strong>${d1} + ${d2} + ${cin} (carry) = ${sum}</strong>.<br>Enter the single units digit below.`
                    : `Add the column digits: <strong>${d1} + ${d2} = ${sum}</strong>.<br>Enter the single units digit below.`,
                addInstrCarry: "Great! Now, what is the carry digit for the next column? Enter it in the grey box above the next column. (Enter 0 if there's no carry!)",
                subInstrReducePassThrough: (d, bottom) => `The next digit is <strong>${d}</strong> — even after lending 1, it wouldn't have enough left for its own subtraction later (it needs at least ${bottom}). So it must first borrow a ten from its own left neighbour, then lend 1 to the column on its right. Write its new value in the box above it.`,
                subInstrReduceLend: (d) => `The next digit to the left is <strong>${d}</strong>. It lends 1 to the column on its right. Write its new value in the box above it.`,
                subInstrBoost: (d) => `This column borrowed a ten! What is <strong>${d} + 10</strong>? Write the result in the box above.`,
                correctBoost: 'Correct! This column now has an extra ten.',
                incorrectBoost: "Not quite — this column's digit gained a whole ten. Add 10 to the original digit.",
                subInstrAnswerBoosted: (boosted, bottom) => `Now subtract: <strong>${boosted} − ${bottom}</strong>.<br>Enter the digit below.`,
                subInstrAnswerPlain: (top, bottom) => `Subtract the column digits: <strong>${top} − ${bottom}</strong>.<br>Enter the digit below.`,
                mulInstrAnswer: (d1, d2, cin, prod) => cin > 0
                    ? `Multiply and add your carry: <strong>${d1} × ${d2} + ${cin} (carry) = ${prod}</strong>.<br>Enter the single units digit below.`
                    : `Multiply the column digit: <strong>${d1} × ${d2} = ${prod}</strong>.<br>Enter the single units digit below.`,
                mulInstrCarry: "Great! What is the carry digit for the next column? Enter it above the next column. (Enter 0 if there's no carry!)",
                divInstrQuotient: (value, divisor) => `The number to divide now is <strong>${value}</strong>. How many whole times does ${divisor} fit into ${value}? Enter the digit above.`,
                divInstrSubtrahend: (divisor, q, value) => `Now multiply: <strong>${divisor} × ${q}</strong>. Write the result below the line, under <strong>${value}</strong>.`,
                divInstrDifference: (value, product) => `Now subtract: <strong>${value} − ${product}</strong>. Write the result below.`,
                problemSolvedAdd: (n1, n2, ans) => `Fantastic! ${n1} + ${n2} = ${ans}. Problem solved!`,
                problemSolvedSub: (n1, n2, ans) => `Fantastic! ${n1} − ${n2} = ${ans}. Problem solved!`,
                problemSolvedMul: (n1, n2, ans) => `Fantastic! ${n1} × ${n2} = ${ans}. Problem solved!`,
                problemSolvedDiv: (n1, n2, q, r) => r > 0
                    ? `Fantastic! ${n1} ÷ ${n2} = ${q} remainder ${r}. Problem solved!`
                    : `Fantastic! ${n1} ÷ ${n2} = ${q}. Problem solved!`,
                modePractice: 'Practice',
                modeExam: 'Exam',
                chooseEquations: 'Number of equations:',
                startExam: 'Start Exam',
                examTitle: 'Exam',
                checkAnswersBtn: 'Check Answers',
                correctAnswerIs: (ans) => `Correct answer: ${ans}`,
                correctAnswerIsDiv: (q, r) => r > 0 ? `Correct answer: ${q} remainder ${r}` : `Correct answer: ${q}`,
                examScoreText: (correct, total, pct, points) => `You solved ${correct} of ${total} (${pct}%) — ${points} points`,
                examPass: 'You passed! 🎉',
                examFail: 'Not quite — keep practicing!',
            },
            pl: {
                appTitle: 'Mistrz Matematyki Pisemnej',
                menuTagline: 'Ucz się matematyki pisemnej krok po kroku!',
                chooseOperations: 'Wybierz, co chcesz ćwiczyć:',
                operationAddition: 'Dodawanie',
                operationSubtraction: 'Odejmowanie',
                operationMultiplication: 'Mnożenie',
                operationDivision: 'Dzielenie',
                correctAnswersLabel: 'Poprawne odpowiedzi:',
                chooseRounds: 'Liczba rund:',
                startGame: 'Rozpocznij grę',
                selectAtLeastOne: 'Wybierz przynajmniej jedno działanie do ćwiczenia.',
                menu: 'Menu',
                round: (c, t) => `Runda ${c} z ${t}`,
                score: (s) => `Wynik: ${s}`,
                nextRound: 'Następna runda',
                playAgain: 'Zagraj ponownie',
                congrats: 'Gratulacje! 🎉',
                finishedAll: 'Ukończyłeś wszystkie rundy. Świetnie ćwiczysz matematykę pisemną!',
                finalScore: (s) => `Wynik końcowy: ${s}`,
                correctDigit: 'Poprawna cyfra!',
                correctCarry: 'Poprawne przeniesienie!',
                correctBorrow: 'Poprawna pożyczka!',
                correctQuotient: 'Poprawna cyfra ilorazu!',
                correctSubtrahendDigit: 'Poprawnie!',
                correctDifferenceDigit: 'Poprawnie!',
                incorrectDigitTry: 'Niestety, spróbuj ponownie w tej kolumnie.',
                incorrectCarry: 'Niepoprawne przeniesienie. Sprawdź cyfrę dziesiątek w sumie tej kolumny!',
                incorrectBorrow: 'Niepoprawna pożyczka. Czy trzeba było pożyczyć z następnej kolumny? (0 lub 1)',
                incorrectQuotient: 'Niepoprawna cyfra ilorazu. Ile pełnych razy dzielnik mieści się w tej liczbie?',
                incorrectSubtrahendDigit: 'Niezupełnie — sprawdź mnożenie (dzielnik × cyfra ilorazu).',
                incorrectDifferenceDigit: 'Niezupełnie — sprawdź odejmowanie.',
